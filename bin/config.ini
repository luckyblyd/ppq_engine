; ============================================================
; PPQ 量化交易系统配置文件
; interface = simulation 时为回测，interface = binance 时为实盘
; ============================================================

[system]
; live 实盘模式  backtest 回测模式
mode = backtest
; 交易接口: simulation（回测） / binance（实盘）
interface = simulation

[market]
; 交易对，逗号分隔
currency_pairs = STX/USDT
; K线周期
timeframe = 5m

[account]
; 初始资金
initial_capital = 10000.0

[strategy]
; Python策略模块名（不带.py后缀）
module = ElderRayStrategy
; 策略脚本所在目录（Python搜索路径）
script_dir = .

[backtest]
; 回测K线数量 (288根/天 * 30天 = 8640)
limit = 3000
; 回测起始日期（留空则使用limit回溯）
start_date =

[database]
; 数据库类型: sqlite3 | postgresql
db_type = postgresql
; SQLite3 数据库文件路径
db_path = ./data.db
; PostgreSQL 连接字符串
db_conn = host=localhost port=5432 dbname=hhjrdata user=hhjr password=hhjr

[trade]
; 交易模式: future(合约) / spot(现货)
trademode = future
; 委托模式: 0=下根K线判断成交(限价单), 1=立即成交(市价单)
ispendingorder = 0

[report]
; 是否输出HTML回测报告: true/false
html_report = true
; 报告输出目录（默认: 策略研究）
report_dir = 策略研究

[feishu]
; 飞书 Webhook URL（留空则不发送通知, 仅实盘模式发送）
webhook_url = 

[dll]
czsc_dll = czsc_dll.dll
trade_dll = trade_dll.dll
html_report_dll = html_report_dll.dll